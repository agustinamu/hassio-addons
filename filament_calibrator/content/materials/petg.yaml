code: petg
name: PETG
defaults:
  density: 1.27
  diameter: 1.75
  nozzle_range: [230, 250]
  bed_range: [60, 80]
  base_profile: "Generic PETG (o el de tu marca, si existe)"
  bed_temp: 70
  retraction_speed: 40

steps:
  - id: temperature
    title: Torre de temperatura
    orca_path: "Calibration → Temperature"
    orca_apply: "Filament → Temperature → Nozzle temperature"
    params: { start: 230, end: 250, step: 5 }
    guidance: >
      Imprime la torre de temperatura. El PETG es sensible a la temperatura:
      busca el bloque con menos hilos y oozing pero con buena adhesión entre
      capas. Demasiado caliente: hilos y blobs; demasiado frío: capas débiles.
    input: { kind: choice_value, label: "Temperatura del mejor bloque", unit: "°C" }
    compute: identity
    output: nozzle_temp
    warnings:
      - "El PETG absorbe humedad: si ves burbujas o chisporroteo, seca el filamento antes de calibrar."

  - id: flow
    title: "Flow ratio (YOLO recomendado)"
    ask_current: true
    orca_path: "Calibration → Flow rate → YOLO (recomendado)"
    orca_apply: "Filament → Advanced → Flow ratio"
    params: { base: 1.0 }
    guidance: >
      Imprime el test YOLO recomendado (11 bloques, una sola pasada). Pasa la uña
      por la superficie: el bloque más liso es el de mejor flujo. El flow del PETG
      es crítico; si dudas entre dos, elige el de mayor flujo. Indica abajo el
      flow ratio actual del perfil (Orca → Factor de flujo, p.ej. 0.95) y el
      modificador (delta) del mejor bloque; el delta se SUMA al flow actual
      (ej. 0.95 + (-0.01) = 0.94).
    input: { kind: modifier, label: "Modificador (delta) del mejor bloque", unit: "" }
    compute: flow_yolo
    output: flow_ratio
    warnings: []

  - id: pressure_advance
    title: "Pressure Advance (factor K) — método Tower"
    orca_path: "Calibration → Pressure Advance → Torre PA (DDE)"
    orca_apply: "Filament → activar 'Pressure advance' y poner el valor (vive en el perfil; imprimes desde Orca)"
    params: { start: 0.0, step: 0.002 }
    guidance: >
      Factor K manual (la P1S no tiene lidar). Usa Torre PA, extrusor DDE (la torre
      no admite números: es un gradiente continuo). Busca la zona con las esquinas
      más limpias: sin bulto tras la esquina (PA bajo) ni hueco antes (PA alto).
      Mide con calibre su altura en mm desde la base; la app calcula K = 0.002 ×
      altura. En PETG el K típico es ~0.02–0.04.
    input: { kind: height_mm, label: "Altura de la mejor zona", unit: "mm" }
    compute: pa_tower
    output: pressure_advance
    warnings: []

  - id: retraction
    title: Test de retracción
    orca_path: "Calibration → Retraction"
    orca_apply: "Printer → Extruder → Retraction → Length (o como override por filamento)"
    params: {}
    guidance: >
      El PETG tiende a formar hilos: la retracción importa más que en PLA.
      Imprime la torre y elige la distancia más corta que deje la torre limpia.
    input: { kind: value, label: "Distancia de retracción óptima", unit: "mm" }
    compute: identity
    output: retraction_distance
    warnings: []

  - id: mvs
    title: Máxima velocidad volumétrica (MVS)
    orca_path: "Calibration → Max flowrate"
    orca_apply: "Filament → Advanced → Max volumetric speed (usa el valor 'seguro' con margen)"
    params: { start: 5, end: 20, step: 0.5 }
    guidance: >
      El PETG fluye más lento que el PLA. Mide la altura donde degrada la
      calidad. Se aplicará un margen de seguridad del 15%.
    input: { kind: height_mm, label: "Altura donde degrada la calidad", unit: "mm" }
    compute: mvs
    output: mvs
    warnings: []
